server:
  port: 8123
  servlet:
    context-path: /api
spring:
  application:
    name: cloud_pichub
  profiles:
    active: local
  # 开放更大的文件上传体积
  servlet:
    multipart:
      max-file-size: 10MB



# MyBatis-Plus配置
mybatis-plus:
  # 开启日志
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: false
  # 逻辑删除配置
  global-config:
    db-config:
      logic-delete-field: isDeleted # 全局逻辑删除字段名
      logic-delete-value: 1 # 逻辑已删除值
      logic-not-delete-value: 0 # 逻辑未删除值

# 接口文档配置
knife4j:
  enable: true
  openapi:
    title: "接口文档"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.pichub.cloud_pichub.controller

